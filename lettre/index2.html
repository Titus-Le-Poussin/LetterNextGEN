<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lettre de Motivation</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="container">
        <div class="editor-section">
            <h1>Lettre de motivation </h1>
            <form id="letterForm">
                
                <div class="form-group">
                    <label for="templateSelect">Sélectionner un modèle :</label>
                    <select id="templateSelect">
                        <option value="default">Modèle Standard (Alternance)</option>
                        <option value="2">Modèle 2</option>
                        <option value="3">Modèle 3</option>
                        <option value="4">Modèle 4</option>
                    </select>
                </div>
                
                <hr class="separator">

                <h2>Champs à personnaliser</h2>

                
                <div class="form-group">
                    <label>Domaine de l'entreprise:</label>
                    <input type="text" id="field1" placeholder="mobilité et l’innovation ferroviaire" required>
                </div>

                <div class="form-group">
                    <label>Type de projet, produit ou mission de l'entreprise:</label>
                    <input type="text" id="field2" placeholder="digitalisation des services, l’optimisation des systèmes de transport ou la gestion des infrastructures" required>
                </div>

                <div class="form-group">
                    <label>Langages, frameworks, outils du candidat:</label>
                    <input type="text" id="field3" placeholder="programmation full stack, développement web et outils numériques" required>
                </div>

                <div class="form-group">
                    <label>Technologies de l'entreprise / type de projet de l'entreprise:</label>
                    <input type="text" id="field4" placeholder="développement d’applications et d’outils interactifs" required>
                </div>

                <div class="form-group">
                    <label>Type de projet / technologie effectué par le candidat :</label>
                    <input type="text" id="field5" placeholder="développement web et informatique" required>
                </div>

                <div class="form-group">
                    <label>Intitulé du poste</label>
                    <input type="text" id="field7" placeholder="Développeur Web" required>
                </div>

                <hr class="separator">
                
                <div class="form-group">
                    <label>Nom de l'Entreprise:</label>
                    <input type="text" id="field6" placeholder="SNCF" required>
                </div>

                <div class="form-group">
                    <label>Taille du texte (PDF) :</label>
                    <div class="size-controls">
                        <button type="button" onclick="decreaseSize()" class="size-btn">-</button>
                        <span id="sizeDisplay">11</span>
                        <button type="button" onclick="increaseSize()" class="size-btn">+</button>
                    </div>
                </div>

                <button type="button" onclick="generatePDF()" class="generate-btn">Télécharger en PDF</button>
            </form>
        </div>

        <div class="preview-section">
            <h2>Aperçu de la lettre</h2>
            <div id="letterPreview" class="letter-preview">
                <div class="letter-sidebar">
                    <div class="sidebar-contact">
                        <div class="contact-block">
                            <strong>EMAIL</strong>
                            <p>timotheeithier@gmail.com</p>
                        </div>
                        <div class="contact-block">
                            <strong>TÉLÉPHONE</strong>
                            <p>+33 7 89 42 79 78</p>
                        </div>
                        <div class="contact-block">
                            <strong>ADRESSE</strong>
                            <p>16 rue Lamothe<br>Lyon 69007, France</p>
                        </div>
                    </div>
                </div>
                <div class="letter-content">
                    <div class="letter-header">
                        <h3>TIMOTHÉE ITHIER</h3>
                    </div>
                    
                    <div class="letter-body" contenteditable="true" id="editableBody">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>

            'default': `
                <p>Bonjour Madame, Monsieur,</p>
                
                <p>Je souhaite vous proposer ma candidature, car votre entreprise correspond à ce que je recherche pour mon alternance.</p>
                
                <p>Votre entreprise se démarque à mes yeux grâce à son rôle dans <span class="dynamic-field" id="preview1"></span>, ce qui motive clairement ma candidature.</p>
                
                <p>Votre organisation et la logique derrière vos travaux me donnent envie de m'y impliquer à mon tour, surtout pour participer à des projets comme <span class="dynamic-field" id="preview2"></span> et contribuer à leur réalisation.</p>
                
                <p>Je cherche un environnement où je peux m'investir dans des projets utiles, monter en compétences et comprendre en profondeur comment une équipe professionnelle fait évoluer un produit.</p>
                
                <p>Je suis actuellement en formation chez EPITECH Lyon, et je développe mes compétences en <span class="dynamic-field" id="preview3"></span>. J'ai déjà travaillé sur des projets académiques et personnels <span class="dynamic-field" id="preview4"></span>. Ces projets m'ont permis de développer une approche autonome, méthodique et orientée résultats.</p>
                
                <p>Je peux ainsi apporter à votre équipe mes compétences techniques tout en m'adaptant rapidement à vos outils et méthodes.</p>
                
                <p>Je peux apporter un profil polyvalent, capable de m'adapter à différents outils et technologies.</p>
                
                <p>De plus, les projets que j'ai réalisés <span class="dynamic-field" id="preview5"></span> me donnent déjà une expérience concrète proche de vos activités, ce qui facilitera notre collaboration et l'atteinte de vos objectifs. En combinant ma polyvalence à la diversité de vos projets, nous pourrons atteindre des résultats concrets rapidement et efficacement.</p>
                
                <p>Je serais ravi d'échanger avec vous pour vous montrer plus en détail mes compétences et ma motivation.</p>
                
                <p>Je vous remercie pour votre temps et votre considération.</p>
                
                <p class="signature">Timothée ITHIER</p>
            `,
            '2': `
                <p>Madame, Monsieur,</p>

                <p>Je suis particulièrement enthousiaste à l'idée de contribuer à des missions telles que <span class="dynamic-field" id="preview2"></span>. Je suis jeune diplômé mais je suis prêt à investir toute mon énergie pour apprendre rapidement et m'intégrer efficacement à votre équipe.</p>
                
                <p>Ma motivation, ma soif d'apprendre et ma capacité d'adaptation sont mes principaux atouts. Je serais ravi de vous exposer mes compétences plus en détail lors d'un entretien.</p>
                
                <p>Dans l'attente de votre retour, veuillez agréer, Madame, Monsieur, l'expression de mes salutations distinguées.</p>

                <p class="signature">Timothée ITHIER</p>
            `,
            '3': `
<p>Bonjour Madame, Monsieur,</p>

<p>

</p>

<p>

<p>Timothée ITHIER</p>

            `,
            '4' : `<p>Bonjour Madame, Monsieur,</p>

<p>Je me permets de vous adresser ma candidature, car j’ai été particulièrement attiré par votre travail dans <span class="dynamic-field" id="preview1">(Domaine de l'entreprise)</span> et vos projets autour de <span class="dynamic-field" id="preview2">(type de projet, produit ou mission)</span>.<br>
Votre façon de transformer des besoins concrets en solutions fonctionnelles me parle beaucoup, car c’est ce type de contribution que j’aimerais apporter dans mon alternance.</p>

<p>Je progresse actuellement sur <span class="dynamic-field" id="preview3">(langages, frameworks, outils du candidat)</span> utilisant <span class="dynamic-field" id="preview4">(technologies de l'entreprise / type de projet)</span>.<br>
J’ai déjà réalisé quelques projets qui m’ont permis de tester mes compétences et de trouver des solutions concrètes.<br>
Cette polyvalence me permettra d'apporter rapidement ces acquis à vos équipes.</p>

<p>En mettant mes acquis au service de votre équipe sur <span class="dynamic-field" id="preview5">(type de projet / technologie du candidat)</span> pour le poste de <span class="dynamic-field" id="preview7">(intitulé du poste)</span> chez <span class="dynamic-field" id="preview6">(nom de l’entreprise)</span>, nous pourrons explorer de nouvelles idées, améliorer vos solutions et progresser dans un cadre dynamique.</p>

<p>Merci pour votre attention, je reste à votre disposition pour un échange ou un entretien.</p>

<p class="signature">Timothée ITHIER</p>`

        };
        const JobData = {
            'Développeur Web' : {

        const companyData = {

    'Capgemini': {

    },
    'Thales': {

        field2: "conception de systèmes critiques, intelligence artificielle et cyberdéfense",
        field4: "développement de systèmes sécurisés et critiques",
        
 
    },
    'Société Générale': {
        field1: "services financiers et l'innovation bancaire",
        field2: "développement d'applications bancaires, fintech et services digitaux",
        field4: "développement d'applications financières et systèmes transactionnels",
        

    },
    'EDF': {
        field1: "énergie et la transition écologique",
        field2: "production d'énergie, smart grids et digitalisation énergétique",
        field4: "développement de solutions énergétiques intelligentes",
        

    },
    'Renault': {
        field1: "automobile et la mobilité durable",
        field2: "véhicules connectés, systèmes embarqués et innovation automobile",
        field4: "développement de logiciels automobiles et systèmes connectés",
        

    },
    'Dassault Systèmes': {
        field1: "conception 3D et simulation numérique",

        field4: "développement de logiciels de conception et simulation",
        

    },
    'Ubisoft': {
        field1: "jeu vidéo et divertissement interactif",

        field4: "développement de jeux vidéo et systèmes de gameplay",
        

    },
    'Atos': {
        field1: "transformation digitale et services IT",
        field2: "cloud computing, cybersécurité et big data",
        field4: "développement de solutions cloud et applications d'entreprise",

    'Schneider Electric': {
        field1: "gestion de l'énergie et automatisation",

        field4: "développement de solutions IoT et systèmes automatisés",
        

    },
    'L\'Oréal': {
        field1: "beauté et l'innovation digitale",
        field2: "e-commerce, applications beauty-tech et réalité augmentée",
        field4: "développement d'applications e-commerce et expériences digitales",
        

    },
    'Decathlon': {
        field1: "sport et l'innovation retail",
        field2: "e-commerce, applications mobiles et expérience client digitale",
        field4: "développement d'applications e-commerce et retail",
        

    },
    'BNP Paribas': {
        field1: "services bancaires et fintech",
        field2: "banque digitale, paiements innovants et services financiers",
        field4: "développement d'applications bancaires et solutions fintech",
        

    },
    'Criteo': {
        field1: "publicité digitale et marketing technologique",

        field4: "développement de systèmes de recommandation et traitement massif de données",
        

    },
    'Deezer': {
        field1: "streaming musical et innovation audio",
        field2: "plateformes de streaming, recommandation musicale et applications mobiles",
        field4: "développement d'applications de streaming et services audio",
        
        
    },
    'Doctolib': {
        field1: "e-santé et digitalisation médicale",
        field2: "gestion de rendez-vous médicaux, téléconsultation et dossiers patients",
        field4: "développement d'applications de santé et services patients",
        
        
    },
    'Blablacar': {
        field1: "mobilité partagée et transport collaboratif",
        field2: "plateforme de covoiturage, applications mobiles et optimisation d'itinéraires",
        field4: "développement de plateformes de mise en relation et services mobiles",
        
        
    }
};

function fillCompanyData() {
    const companyName = document.getElementById('field6').value.trim();
    
    if (companyData[companyName]) {
        const data = companyData[companyName];
        
        document.getElementById('field1').value = data.field1;
        document.getElementById('field2').value = data.field2;
        document.getElementById('field4').value = data.field4;
        
        updateAllPreviews();
    }
}
document.getElementById('field6').addEventListener('input', function() {
    updatePreview('field6');
    fillCompanyData();
});
document.getElementById('field7').addEventListener('input', function() {
    updatePreview('field7');
    fillJobData();
});

function fillJobData() {
    const JobName = document.getElementById('field7').value.trim();
    
    if (JobData[JobName]) {
        const data = JobData[JobName];
        document.getElementById('field3').value = data.field3;
        document.getElementById('field5').value = data.field5;
        updateAllPreviews();
    }
}





        function updatePreview(fieldId) {
            const input = document.getElementById(fieldId);
            const preview = document.getElementById(fieldId.replace('field', 'preview'));
            

            const number = fieldId.replace('field', '');
            let defaultText = '';

            if (number === '1') defaultText = '(Domaine de l\'entreprise)';
            if (number === '2') defaultText = '(type de projet, produit ou mission)';
            if (number === '3') defaultText = '(langages, frameworks, outils du candidat)';
            if (number === '4') defaultText = '(technologies de l\'entreprise / type de projet)';
            if (number === '5') defaultText = '(type de projet / technologie du candidat)';
            if (number === '6') defaultText = '(nom de l\'entreprise)';
            if (number === '7') defaultText = '(intitulé du poste)';
            
            if (preview) {
                preview.textContent = input.value || defaultText;
            }
        }


        function updateAllPreviews() {
            updatePreview('field1');
            updatePreview('field2');
            updatePreview('field3');
            updatePreview('field4');
            updatePreview('field5');
            updatePreview('field6');
            updatePreview('field7');
        }


        function loadTemplate(templateKey) {
            const editableBody = document.getElementById('editableBody');
            const templateHtml = letterTemplates[templateKey] || letterTemplates['default'];
            
  
            editableBody.innerHTML = templateHtml;
            

            editableBody.style.fontSize = fontSize + 'px';
            
            updateAllPreviews();
        }



        document.getElementById('field1').addEventListener('input', () => updatePreview('field1'));
        document.getElementById('field2').addEventListener('input', () => updatePreview('field2'));
        document.getElementById('field3').addEventListener('input', () => updatePreview('field3'));
        document.getElementById('field4').addEventListener('input', () => updatePreview('field4'));
        document.getElementById('field5').addEventListener('input', () => updatePreview('field5'));
        document.getElementById('field6').addEventListener('input', () => updatePreview('field6'));
        document.getElementById('field7').addEventListener('input', () => updatePreview('field7'));


        document.getElementById('templateSelect').addEventListener('change', function() {
            loadTemplate(this.value);
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadTemplate('default');
        });

        
        function increaseSize() {
            if (fontSize < 14) {
                fontSize++;
                document.getElementById('sizeDisplay').textContent = fontSize;
                document.getElementById('editableBody').style.fontSize = fontSize + 'px';
            }
        }

        function decreaseSize() {
            if (fontSize > 8) {
                fontSize--;
                document.getElementById('sizeDisplay').textContent = fontSize;
                document.getElementById('editableBody').style.fontSize = fontSize + 'px';
            }
        }


        function generatePDF() {
            const form = document.getElementById('letterForm');
            if (!form.checkValidity()) {
                alert('Veuillez remplir tous les champs avant de générer le PDF.');
                form.reportValidity();
                return;
            }

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            const companyName = document.getElementById('field6').value.trim() || "Entreprise";
            

            const gradient = pdf.internal.write('q');
            pdf.setFillColor(41, 107, 63);
            pdf.rect(0, 0, 175, 50, 'F');
            pdf.setFillColor(44, 115, 72);
            pdf.rect(157, 0, 53, 297, 'F');


            pdf.setTextColor(255, 255, 255);
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(18);
            pdf.text('TIMOTHÉE ITHIER', 15, 30);


            pdf.setTextColor(255, 255, 255);
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'bold');
            
            let emailY = 60;
            pdf.text('EMAIL', 165, 55);
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(7);
            const emailLines = pdf.splitTextToSize('timotheeithier@gmail.com', 18);
            emailLines.forEach(line => {
                pdf.text(line, 165, emailY);
                emailY += 3;
            });
            
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(8);
            pdf.text('TÉLÉPHONE', 165, emailY + 5);
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(7);
            pdf.text('+33 7 89 42 79 78', 165, emailY + 9);
            
            pdf.setFont('helvetica', 'bold');
            pdf.setFontSize(8);
            pdf.text('ADRESSE', 165, emailY + 17);
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(7);
            pdf.text('16 rue Lamothe', 165, emailY + 21);
            pdf.text('Lyon 69007', 165, emailY + 24);
            pdf.text('France', 165, emailY + 27);
            

            pdf.setTextColor(0, 0, 0);
            pdf.setFont('helvetica', 'normal');
            pdf.setFontSize(fontSize);
            
            let y = 60;
            const lineHeight = fontSize * 0.45; 
            const maxWidth = 135;
            
            const editableBody = document.getElementById('editableBody');
            const paragraphs = editableBody.querySelectorAll('p');
            
            paragraphs.forEach(p => {
                
                let text = p.textContent.trim();
                
                if (p.classList.contains('signature')) {
                    if (text) {
                        if (y > 270) {
                            pdf.addPage();
                            y = 20;
                        }
                        pdf.setFont('helvetica', 'bold'); 
                        pdf.text(text, 15, y);
                        pdf.setFont('helvetica', 'normal'); 
                        y += lineHeight * 2;
                    }
                    return; 
                }
                
                if (text) {
                    const lines = pdf.splitTextToSize(text, maxWidth);
                    lines.forEach(line => {
                        if (y > 270) {
                            pdf.addPage();
                            y = 20;
                        }
                        pdf.text(line, 15, y);
                        y += lineHeight;
                    });
                    y += lineHeight * 0.8;
                }
            });
            
            
            pdf.save('Lettre_Motivation_Timothee_ITHIER_' + companyName + '.pdf');
        }
    </script>
</body>
</html>
